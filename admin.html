<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора - Магазин бытовой техники</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Панель администратора</h1>
            <nav>
                <ul>
                    <li><a href="/">На сайт</a></li>
                    <li><a href="#products">Управление товарами</a></li>
                    <li><a href="#orders">Заказы</a></li>
                    <li>
                        <span id="username"></span>
                        <button onclick="logout()">Выход</button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="products">
            <h2>Управление товарами</h2>
            <button onclick="showAddProductForm()">Добавить товар</button>
            
            <div id="add-product-form" style="display: none;" class="form-container">
                <h3>Добавить новый товар</h3>
                <form id="product-form">
                    <div class="form-group">
                        <label>Название:</label>
                        <input type="text" id="product-name" required>
                    </div>
                    <div class="form-group">
                        <label>Описание:</label>
                        <textarea id="product-description" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Цена:</label>
                        <input type="number" id="product-price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Категория:</label>
                        <input type="text" id="product-category" required>
                    </div>
                    <div class="form-group">
                        <label>Количество на складе:</label>
                        <input type="number" id="product-stock" required>
                    </div>
                    <div class="form-group">
                        <label>URL изображения:</label>
                        <input type="text" id="product-image" required>
                    </div>
                    <button type="submit">Сохранить</button>
                    <button type="button" onclick="hideAddProductForm()">Отмена</button>
                </form>
            </div>
            
            <div id="products-list" class="admin-products"></div>
        </section>

        <section id="orders">
            <h2>Заказы</h2>
            <div id="orders-list"></div>
        </section>
    </main>

    <script src="/js/admin.js"></script>
</body>
</html>
