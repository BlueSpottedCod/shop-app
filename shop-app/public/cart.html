<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Магазин бытовой техники</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Магазин бытовой техники</h1>
            <nav>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/cart.html">Корзина (<span id="cart-count">0</span>)</a></li>
                    <li id="auth-links">
                        <a href="/login.html">Вход</a>
                        <a href="/register.html">Регистрация</a>
                    </li>
                    <li id="user-menu" style="display: none;">
                        <span id="username"></span>
                        <button onclick="logout()">Выход</button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2>Корзина</h2>
        
        <div id="cart-content">
            <div id="empty-cart-message" style="display: none;">
                <p>Ваша корзина пуста</p>
                <a href="/" class="button">Перейти к покупкам</a>
            </div>
            
            <div id="cart-items-container" style="display: none;">
                <div id="cart-items"></div>
                
                <div class="cart-summary">
                    <div class="cart-total">
                        <strong>Итого: </strong><span id="cart-total">0</span> руб.
                    </div>
                    <button onclick="checkout()" id="checkout-btn" class="checkout-btn">Оформить заказ</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Магазин бытовой техники. Все права защищены.</p>
        </div>
    </footer>

    <script src="/js/cart.js"></script>
</body>
</html>
